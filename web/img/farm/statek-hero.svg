<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 450" preserveAspectRatio="xMidYMid slice" width="1280" height="450">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2350"/><stop offset=".4" stop-color="#3b3566"/>
      <stop offset=".66" stop-color="#8a4f6e"/><stop offset=".86" stop-color="#dc8347"/><stop offset="1" stop-color="#f4ad5c"/>
    </linearGradient>
    <radialGradient id="sun" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff2c4"/><stop offset=".35" stop-color="#ffcf7a" stop-opacity=".85"/><stop offset="1" stop-color="#ff9a4a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c8b40"/><stop offset="1" stop-color="#2f5226"/>
    </linearGradient>
    <linearGradient id="hillA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7a5a5e"/><stop offset="1" stop-color="#5a4553"/></linearGradient>
    <linearGradient id="hillB" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4e6b3c"/><stop offset="1" stop-color="#3c5730"/></linearGradient>
  </defs>

  <!-- obloha + slunce -->
  <rect width="1280" height="450" fill="url(#sky2)"/>
  <circle cx="920" cy="250" r="185" fill="url(#sun)"/>
  <circle cx="920" cy="250" r="52" fill="#ffe9b0"/>
  <circle cx="920" cy="250" r="52" fill="#fff4d0" opacity=".5"/>

  <!-- ptáci -->
  <g stroke="#2a2440" stroke-width="3" fill="none" opacity=".5" stroke-linecap="round">
    <path d="M250 96 q10 -9 20 0 q10 -9 20 0"/><path d="M320 120 q8 -7 16 0 q8 -7 16 0"/>
    <path d="M1030 84 q9 -8 18 0 q9 -8 18 0"/>
  </g>

  <!-- vzdálené kopce -->
  <path d="M0 250 Q220 210 500 244 T1000 236 T1280 244 V450 H0Z" fill="url(#hillA)" opacity=".8"/>
  <path d="M0 286 Q300 244 640 282 T1280 272 V450 H0Z" fill="url(#hillB)"/>

  <!-- tráva -->
  <rect y="300" width="1280" height="150" fill="url(#grass)"/>
  <path d="M0 300 Q320 280 660 300 T1280 296 V330 H0Z" fill="#4a7534" opacity=".6"/>

  <!-- stromy vpravo -->
  <g transform="translate(1120 214)">
    <rect x="-9" y="52" width="18" height="60" fill="#4c3220"/>
    <circle cx="0" cy="44" r="48" fill="#3a6136"/><circle cx="-32" cy="66" r="34" fill="#33562f"/><circle cx="32" cy="66" r="34" fill="#365a32"/>
  </g>
  <g transform="translate(1035 262)">
    <rect x="-6" y="34" width="12" height="42" fill="#4c3220"/><circle cx="0" cy="28" r="30" fill="#375c33"/>
  </g>

  <!-- větrník -->
  <g transform="translate(690 196)" stroke="#3a2c1c" stroke-width="4">
    <line x1="0" y1="10" x2="0" y2="118" stroke="#5a4326"/>
    <g fill="#c9a86a" stroke="#8a6a3a" stroke-width="2">
      <polygon points="0,10 -6,-40 6,-40"/><polygon points="0,10 40,-6 40,6"/>
      <polygon points="0,10 6,60 -6,60"/><polygon points="0,10 -40,6 -40,-6"/>
    </g>
    <circle cx="0" cy="10" r="6" fill="#5a4326" stroke="none"/>
  </g>

  <!-- STODOLA -->
  <g transform="translate(130 176)">
    <ellipse cx="115" cy="146" rx="150" ry="16" fill="#000" opacity=".22"/>
    <polygon points="-16,58 115,4 246,58 246,64 -16,64" fill="#7c2a25"/>
    <rect x="0" y="58" width="230" height="90" fill="#b4413a"/>
    <rect x="0" y="58" width="230" height="90" fill="none" stroke="#8d2f29" stroke-width="3"/>
    <!-- prkna -->
    <g stroke="#9a352f" stroke-width="2" opacity=".7"><line x1="46" y1="58" x2="46" y2="148"/><line x1="92" y1="58" x2="92" y2="148"/><line x1="138" y1="58" x2="138" y2="148"/><line x1="184" y1="58" x2="184" y2="148"/></g>
    <!-- vrata -->
    <rect x="86" y="92" width="58" height="56" fill="#5e221c"/>
    <line x1="86" y1="92" x2="144" y2="148" stroke="#e7d4a4" stroke-width="4"/><line x1="144" y1="92" x2="86" y2="148" stroke="#e7d4a4" stroke-width="4"/>
    <!-- okno hayloft -->
    <rect x="98" y="64" width="34" height="24" fill="#f4d488"/><rect x="98" y="64" width="34" height="24" fill="none" stroke="#7c2a25" stroke-width="2"/>
    <line x1="115" y1="64" x2="115" y2="88" stroke="#7c2a25" stroke-width="2"/><line x1="98" y1="76" x2="132" y2="76" stroke="#7c2a25" stroke-width="2"/>
    <!-- korouhvička -->
    <line x1="115" y1="4" x2="115" y2="-16" stroke="#3a2c1c" stroke-width="3"/><polygon points="115,-16 134,-11 115,-6" fill="#3a2c1c"/>
  </g>

  <!-- plot vpředu -->
  <g stroke="#a07a44" stroke-width="6" stroke-linecap="round">
    <line x1="0" y1="382" x2="1280" y2="382"/><line x1="0" y1="404" x2="1280" y2="404"/>
    <g stroke="#b88a52" stroke-width="8">
      <line x1="60" y1="368" x2="60" y2="424"/><line x1="240" y1="368" x2="240" y2="424"/><line x1="420" y1="368" x2="420" y2="424"/>
      <line x1="860" y1="368" x2="860" y2="424"/><line x1="1040" y1="368" x2="1040" y2="424"/><line x1="1220" y1="368" x2="1220" y2="424"/>
    </g>
  </g>
</svg>
