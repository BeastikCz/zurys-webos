<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ověření losu · Provably Fair</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:#12100e; color:#efe7db; padding:24px; }
  .wrap { max-width:760px; margin:0 auto; }
  h1 { font-size:22px; margin:0 0 4px; }
  .sub { color:#a89a86; margin:0 0 20px; }
  .card { background:#1c1813; border:1px solid #34291d; border-radius:14px; padding:18px; margin-bottom:16px; }
  .row { display:flex; gap:10px; align-items:center; margin:8px 0; }
  input { flex:1; background:#12100e; border:1px solid #3a2e20; border-radius:8px; color:#efe7db; padding:9px 11px; font:inherit; }
  button { background:#e8912a; border:0; border-radius:8px; color:#1a1206; font-weight:700; padding:9px 16px; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .check { display:flex; gap:10px; align-items:flex-start; padding:9px 0; border-top:1px solid #2a2118; }
  .check:first-child { border-top:0; }
  .ico { font-size:18px; line-height:1.3; }
  .ok { color:#5fd68a; } .bad { color:#ff6b6b; } .muted { color:#a89a86; }
  code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; word-break:break-all; background:#12100e; padding:2px 5px; border-radius:5px; }
  .verdict { font-size:19px; font-weight:800; padding:14px; border-radius:12px; text-align:center; }
  .verdict.ok { background:#12331f; color:#5fd68a; } .verdict.bad { background:#331414; color:#ff6b6b; }
  .k { color:#a89a86; font-size:12px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
  .win { font-size:17px; font-weight:800; color:#ffd27a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔍 Ověření losu tomboly</h1>
  <p class="sub">Provably fair — přepočítáno u tebe v prohlížeči. Serveru nemusíš věřit.</p>

  <div class="card">
    <div class="row">
      <input id="pid" type="number" placeholder="ID tomboly (např. 46)" inputmode="numeric">
      <button id="go">Ověřit</button>
    </div>
    <div class="muted" style="font-size:13px">
      Algoritmus: <code>winner_index = int(HMAC_SHA256(seed, roster)[:8]) % total</code>.
      Před losem je zveřejněn jen <code>sha256(seed)</code> — admin tím nemůže výsledek ohnout.
    </div>
  </div>

  <div id="out"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const enc = new TextEncoder();
const hex = buf => [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");

async function sha256(str){ return hex(await crypto.subtle.digest("SHA-256", enc.encode(str))); }

async function hmacIndex(seed, roster, total){
  const key = await crypto.subtle.importKey("raw", enc.encode(seed), {name:"HMAC",hash:"SHA-256"}, false, ["sign"]);
  const mac = new Uint8Array(await crypto.subtle.sign("HMAC", key, enc.encode(roster)));
  let n = 0n;                       // prvních 8 bajtů big-endian
  for (let i=0;i<8;i++) n = (n<<8n) | BigInt(mac[i]);
  return Number(n % BigInt(total));
}

function line(ok, title, detail){
  return `<div class="check"><span class="ico ${ok?'ok':'bad'}">${ok?'✓':'✗'}</span>
    <div><div>${title}</div>${detail?`<div class="muted" style="font-size:12.5px;margin-top:2px">${detail}</div>`:''}</div></div>`;
}

async function verify(pid){
  const out = $("#out");
  out.innerHTML = `<div class="card muted">Načítám důkaz…</div>`;
  let p;
  try {
    const r = await fetch(`/api/shop/raffle/${pid}/proof`);
    if (!r.ok) { out.innerHTML = `<div class="card bad">${(await r.json()).detail || r.status}</div>`; return; }
    p = await r.json();
  } catch(e){ out.innerHTML = `<div class="card bad">Chyba sítě: ${e.message}</div>`; return; }

  if (!p.drawn){
    out.innerHTML = `<div class="card">
      <div class="k">Stav</div><div>Zacommitováno, zatím nevylosováno.</div>
      <div class="check"><span class="ico ok">🔒</span><div>Seed je zamčen. Zveřejněný <b>seed_hash</b> se po losu musí shodovat s odhaleným seedem.</div></div>
      <div style="margin-top:10px"><div class="k">seed_hash (commitment)</div><code>${p.seed_hash}</code></div>
      <div style="margin-top:8px"><div class="k">roster_hash</div><code>${p.roster_hash}</code></div>
      <div style="margin-top:8px"><div class="k">Tiketů</div><code>${p.total_tickets}</code></div>
    </div>`;
    return;
  }

  // přepočet
  const seedHashCalc = await sha256(p.seed);
  const rosterHashCalc = await sha256(p.roster);
  const idxCalc = await hmacIndex(p.seed, p.roster, p.total_tickets);
  const rosterLines = p.roster.split("\n");
  const winnerLine = rosterLines[idxCalc] || "";
  const winnerName = winnerLine.split("\t")[2] || "";

  const c1 = seedHashCalc === p.seed_hash;
  const c2 = rosterHashCalc === p.roster_hash;
  const c3 = idxCalc === p.winner_index;
  const c4 = winnerName === p.winner;
  const all = c1 && c2 && c3 && c4;

  out.innerHTML = `
    <div class="verdict ${all?'ok':'bad'}">${all?'✓ Los je férový a ověřený':'✗ NESEDÍ — pozor!'}</div>
    <div class="card">
      <div class="win">🏆 ${p.winner}</div>
      <div class="muted">tiket #${p.winner_index} z ${p.total_tickets} · vylosováno ${p.drawn_at}</div>
    </div>
    <div class="card">
      ${line(c1, "Seed sedí na commitment", `sha256(seed) = <code>${seedHashCalc}</code>`)}
      ${line(c2, "Seznam tiketů nezměněn", `sha256(roster) = <code>${rosterHashCalc}</code>`)}
      ${line(c3, "Výherní index přepočítán", `HMAC → index <b>${idxCalc}</b> (server: ${p.winner_index})`)}
      ${line(c4, "Jméno výherce sedí", `roster[${idxCalc}] = <b>${winnerName||'—'}</b>`)}
    </div>
    <div class="card">
      <div class="k">seed (odhalený)</div><code>${p.seed}</code>
      <div class="k" style="margin-top:10px">roster (${p.total_tickets} tiketů)</div>
      <code style="display:block;white-space:pre-wrap;max-height:200px;overflow:auto">${p.roster.replace(/</g,"&lt;")}</code>
    </div>`;
}

$("#go").onclick = () => { const v = $("#pid").value.trim(); if (v) { history.replaceState(0,0,`?pid=${v}`); verify(v); } };
$("#pid").addEventListener("keydown", e => { if (e.key === "Enter") $("#go").click(); });
const qp = new URLSearchParams(location.search).get("pid");
if (qp){ $("#pid").value = qp; verify(qp); }
</script>
</body>
</html>
