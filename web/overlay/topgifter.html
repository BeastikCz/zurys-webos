<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZURYS — Top gifteři overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; font-family: "Rajdhani", "Segoe UI", system-ui, Arial, sans-serif; }
  :root {
    --g: #9bee4f; --g2: #7fe03a; --gd: #4fae22;
    --gold: #f4b41a; --gold2: #ffd24a; --gold-d: #b9760c;
    --pp: #9147ff; --ink: #eef3e6; --dim: #8c9a82;
  }
  #wrap { padding: 24px; display: inline-block; }
  #wrap.hidden { display: none; }

  .panel {
    position: relative; width: 430px; padding: 18px 26px 20px;
    background: linear-gradient(160deg, #0c1109 0%, #0a0d07 55%, #0c0f08 100%);
    clip-path: polygon(0 16px, 22px 0, calc(100% - 64px) 0, 100% 32px, 100% 100%, 64px 100%, 0 calc(100% - 20px));
    box-shadow: inset 0 0 0 1.5px rgba(244,180,26,.28), inset 0 0 70px rgba(0,0,0,.6), 0 0 40px rgba(244,180,26,.1);
  }
  .corner { position: absolute; width: 24px; height: 24px; pointer-events: none; }
  .corner.tl { top: 8px; left: 8px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner.bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--g); border-left: 2px solid var(--g); }
  .pp-tick { position: absolute; top: 13px; right: 16px; }
  .pp-tick span { display: inline-block; width: 7px; height: 7px; margin-left: 3px; transform: skewX(-18deg);
    background: var(--pp); box-shadow: 0 0 7px rgba(145,71,255,.7); }
  .dots { position: absolute; bottom: 13px; right: 26px; color: var(--gold-d); letter-spacing: 3px; font-size: 13px; opacity: .8; }

  .head { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
  .head .cross { color: var(--g); font-size: 15px; }
  .head .url { color: var(--g); font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  .head .rule { flex: 1; height: 2px; max-width: 80px; margin: 0 4px; background: linear-gradient(90deg, rgba(155,238,79,.5), transparent); }
  .head .ttl { font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--ink); }
  .head .ttl b { background: linear-gradient(180deg, #ffe48a, var(--gold) 60%, var(--gold-d));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

  .top1 { display: flex; align-items: center; gap: 14px; padding: 11px 14px; margin-bottom: 9px; position: relative;
    background: linear-gradient(120deg, rgba(244,180,26,.16), rgba(155,238,79,.07));
    box-shadow: inset 0 0 0 1.5px rgba(244,180,26,.4), 0 0 22px rgba(244,180,26,.16);
    clip-path: polygon(0 10px, 12px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 12px) 100%, 0 100%); }
  .crown { position: absolute; top: -13px; left: 16px; font-size: 22px; filter: drop-shadow(0 2px 6px rgba(0,0,0,.6)); }
  .av { width: 50px; height: 50px; flex: none; display: grid; place-items: center; font-size: 22px; font-weight: 800;
    color: #1a1200; background: linear-gradient(140deg, var(--gold2), var(--gold)); overflow: hidden; box-shadow: 0 0 14px rgba(244,180,26,.45);
    clip-path: polygon(0 8px, 8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%); }
  .av img { width: 100%; height: 100%; object-fit: cover; }
  .t1info { flex: 1; min-width: 0; }
  .t1info .nm { font-size: 24px; font-weight: 800; color: var(--ink); line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .t1info .ct { font-size: 14px; font-weight: 700; color: var(--gold2); margin-top: 4px; }
  .t1info .ct b { font-size: 17px; }

  .row { display: flex; align-items: center; gap: 11px; padding: 6px 14px; }
  .row + .row { border-top: 1px solid rgba(255,255,255,.05); }
  .row .rk { width: 18px; text-align: center; font-size: 15px; font-weight: 900; color: var(--dim); }
  .row .sav { width: 30px; height: 30px; flex: none; display: grid; place-items: center; font-size: 13px; font-weight: 800;
    color: #0c1109; background: linear-gradient(140deg, var(--g), var(--gd)); overflow: hidden;
    clip-path: polygon(0 6px, 6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%); }
  .row .sav img { width: 100%; height: 100%; object-fit: cover; }
  .row .nm { flex: 1; font-size: 16px; font-weight: 700; color: #cdd7c2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .ct { font-size: 14px; font-weight: 800; color: var(--gold2); }
</style>
</head>
<body>
<div id="wrap" class="hidden">
  <div class="panel">
    <span class="corner tl"></span><span class="corner bl"></span>
    <span class="pp-tick"><span></span><span></span></span>
    <span class="dots">• • •</span>
    <div class="head">
      <span class="cross">◎</span><span class="url">zurys.live</span><span class="rule"></span>
      <span class="ttl">TOP GIFTEŘI <b>DNES</b> 🎁</span>
    </div>
    <div id="list"></div>
  </div>
</div>
<script>
  // Náhled bez API: /overlay/topgifter.html?demo
  function avHTML(g) { return g.avatar_url ? '<img src="' + g.avatar_url + '" alt="">' : (g.username || "?").charAt(0).toUpperCase(); }
  function esc(s) { return (s || "").replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]); }); }
  function render(gifters) {
    var wrap = document.getElementById("wrap"), list = document.getElementById("list");
    if (!gifters || !gifters.length) { wrap.classList.add("hidden"); return; }
    wrap.classList.remove("hidden");
    var g0 = gifters[0];
    var html = '<div class="top1"><span class="crown">👑</span><span class="av">' + avHTML(g0) + '</span>'
      + '<div class="t1info"><div class="nm">' + esc(g0.username) + '</div>'
      + '<div class="ct"><b>' + g0.subs + '</b> gift ' + (g0.subs === 1 ? "sub" : "subů") + ' 🎁</div></div></div>';
    for (var i = 1; i < gifters.length; i++) {
      var g = gifters[i];
      html += '<div class="row"><span class="rk">' + (i + 1) + '</span><span class="sav">' + avHTML(g) + '</span>'
        + '<span class="nm">' + esc(g.username) + '</span><span class="ct">' + g.subs + ' 🎁</span></div>';
    }
    list.innerHTML = html;
  }
  function demo() {
    return [{ username: "Martech1", subs: 12 }, { username: "Numero_21", subs: 8 },
            { username: "marek_1p", subs: 5 }, { username: "Kapepepe", subs: 3 }, { username: "skytlix", subs: 2 }];
  }
  function poll() {
    if (new URLSearchParams(location.search).has("demo")) { render(demo()); return; }
    fetch("/api/top-gifters", { cache: "no-store" })
      .then(function (r) { return r.json(); }).then(function (d) { render(d.gifters || []); }).catch(function () {});
  }
  poll();
  setInterval(poll, 5000);
</script>
</body>
</html>
