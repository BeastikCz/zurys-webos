<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZURYS — Gift alert overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden;
    font-family: "Rajdhani", "Segoe UI", system-ui, Arial, sans-serif; }
  :root {
    --g: #9bee4f; --g2: #7fe03a; --gd: #4fae22;
    --gold: #f4b41a; --gold2: #ffd24a; --gold-d: #b9760c;
    --pp: #9147ff; --ink: #eef3e6; --dim: #8c9a82;
  }
  #stage { position: fixed; inset: 0; display: grid; place-items: center; }

  /* ===== karta alertu ===== */
  .card {
    position: relative; width: 440px; padding: 30px 30px 26px; text-align: center;
    background: linear-gradient(160deg, #0c1109 0%, #0a0d07 55%, #0c0f08 100%);
    clip-path: polygon(0 22px, 30px 0, calc(100% - 78px) 0, 100% 40px, 100% calc(100% - 22px),
                       calc(100% - 30px) 100%, 78px 100%, 0 calc(100% - 40px));
    box-shadow: inset 0 0 0 2px rgba(244,180,26,.34), inset 0 0 90px rgba(0,0,0,.6),
                0 0 60px rgba(244,180,26,.18), 0 18px 50px rgba(0,0,0,.5);
    opacity: 0; transform: translateY(-46px) scale(.84); will-change: transform, opacity;
  }
  .card.show { animation: pop-in .62s cubic-bezier(.2,1.35,.4,1) forwards; }
  .card.out  { animation: pop-out .46s ease forwards; }
  @keyframes pop-in  { to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes pop-out { to { opacity: 0; transform: translateY(-22px) scale(.92); } }

  /* rohové závorky + akcenty (zurys jazyk) */
  .corner { position: absolute; width: 28px; height: 28px; pointer-events: none; }
  .corner.tl { top: 11px; left: 11px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
  .corner.tr { top: 11px; right: 11px; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
  .corner.bl { bottom: 11px; left: 11px; border-bottom: 2px solid var(--g); border-left: 2px solid var(--g); }
  .corner.br { bottom: 11px; right: 11px; border-bottom: 2px solid var(--g); border-right: 2px solid var(--g); }
  .pp-tick { position: absolute; top: 17px; right: 22px; }
  .pp-tick span { display: inline-block; width: 8px; height: 8px; margin-left: 4px; transform: skewX(-18deg);
    background: var(--pp); box-shadow: 0 0 8px rgba(145,71,255,.7); }

  /* horní cedule GIFT SUB */
  .banner { display: inline-block; padding: 5px 22px; margin-bottom: 4px; font-size: 16px; font-weight: 900;
    letter-spacing: 4px; text-transform: uppercase; color: #1a1200;
    background: linear-gradient(180deg, var(--gold2), var(--gold) 60%, var(--gold-d));
    clip-path: polygon(0 8px, 10px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 10px) 100%, 0 100%);
    box-shadow: 0 0 22px rgba(244,180,26,.45); }
  .brand { margin-top: 9px; font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--g);
    text-transform: uppercase; opacity: .85; }

  /* dárek emoji */
  .gift { font-size: 58px; line-height: 1; margin: 6px 0 2px; display: inline-block;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)) drop-shadow(0 0 16px rgba(244,180,26,.4));
    animation: gift-bob 1.1s ease-in-out infinite; }
  @keyframes gift-bob { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-7px) rotate(4deg); } }

  /* avatar */
  .av { width: 78px; height: 78px; margin: 8px auto 10px; display: grid; place-items: center;
    font-size: 32px; font-weight: 800; color: #1a1200; overflow: hidden;
    background: linear-gradient(140deg, var(--gold2), var(--gold)); box-shadow: 0 0 22px rgba(244,180,26,.5);
    clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%); }
  .av img { width: 100%; height: 100%; object-fit: cover; }
  .av.empty { display: none; }

  /* jméno + text */
  .nm { font-size: 34px; font-weight: 900; line-height: 1.05; color: var(--ink);
    text-shadow: 0 0 18px rgba(155,238,79,.35); word-break: break-word;
    background: linear-gradient(180deg, #ffffff, #d7e7c4);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .msg { margin-top: 9px; font-size: 19px; font-weight: 700; color: var(--ink); }
  .msg b { font-size: 30px; font-weight: 900; margin: 0 3px;
    background: linear-gradient(180deg, #ffe48a, var(--gold) 60%, var(--gold-d));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { margin-top: 8px; font-size: 14px; font-weight: 700; letter-spacing: 1px; color: var(--gold2); }

  /* rázová vlna při pop-in */
  .shock { position: absolute; left: 50%; top: 42%; width: 10px; height: 10px; border-radius: 50%;
    transform: translate(-50%,-50%); pointer-events: none; border: 3px solid rgba(244,180,26,.6); opacity: 0; }
  .card.show .shock { animation: shock .8s ease-out .12s forwards; }
  @keyframes shock { 0% { opacity: .8; width: 10px; height: 10px; }
                     100% { opacity: 0; width: 360px; height: 360px; } }

  /* konfety */
  #confetti { position: absolute; inset: 0; overflow: visible; pointer-events: none; }
  .cf { position: absolute; top: 30%; left: 50%; width: 9px; height: 14px; opacity: 0;
    animation: cf-fall var(--dur,1.3s) ease-out var(--del,0s) forwards; }
  @keyframes cf-fall {
    0%   { opacity: 1; transform: translate(0,0) rotate(0); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)); }
  }
</style>
</head>
<body>
<div id="stage"></div>
<script>
  // Náhled bez API: /overlay/giftalert.html?demo  (smyčka ukázek)
  // Bezpečnost: jen čte /api/recent-gifts. Žádný zápis. Test-only dokud nenasadíme.
  var POLL_MS = 3000, HOLD_MS = 6500;
  var COLORS = ["#f4b41a", "#ffd24a", "#9bee4f", "#7fe03a", "#9147ff", "#ffffff"];

  var queue = [], playing = false, lastId = null;

  function esc(s) { return (s || "").replace(/[&<>"]/g, function (c) {
    return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]); }); }
  function avHTML(g) {
    if (g.avatar_url) return '<span class="av"><img src="' + esc(g.avatar_url) + '" alt=""></span>';
    var ch = (g.username || "?").charAt(0).toUpperCase();
    return '<span class="av">' + ch + '</span>';
  }
  function confetti(layer, n) {
    var html = "";
    for (var i = 0; i < n; i++) {
      var dx = (Math.random() * 460 - 230).toFixed(0) + "px";
      var dy = (Math.random() * 240 + 160).toFixed(0) + "px";
      var rot = (Math.random() * 900 - 450).toFixed(0) + "deg";
      var dur = (Math.random() * 0.9 + 1.0).toFixed(2) + "s";
      var del = (Math.random() * 0.35).toFixed(2) + "s";
      var col = COLORS[(Math.random() * COLORS.length) | 0];
      var w = (Math.random() * 6 + 6).toFixed(0), h = (Math.random() * 8 + 8).toFixed(0);
      var rad = Math.random() < 0.4 ? "50%" : "1px";
      html += '<span class="cf" style="--dx:' + dx + ';--dy:' + dy + ';--rot:' + rot
        + ';--dur:' + dur + ';--del:' + del + ';left:' + (40 + Math.random() * 20).toFixed(0)
        + '%;background:' + col + ';width:' + w + 'px;height:' + h + 'px;border-radius:' + rad + '"></span>';
    }
    layer.innerHTML = html;
  }
  function chime() {
    try {
      var AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;
      var ctx = chime._c || (chime._c = new AC());
      [0, 0.12].forEach(function (t, i) {
        var o = ctx.createOscillator(), gn = ctx.createGain();
        o.type = "triangle"; o.frequency.value = i ? 1175 : 784;   // G5 → D6
        o.connect(gn); gn.connect(ctx.destination);
        var s = ctx.currentTime + t;
        gn.gain.setValueAtTime(0.0001, s);
        gn.gain.exponentialRampToValueAtTime(0.16, s + 0.02);
        gn.gain.exponentialRampToValueAtTime(0.0001, s + 0.5);
        o.start(s); o.stop(s + 0.55);
      });
    } catch (e) {}
  }

  function showAlert(g) {
    var n = g.subs || 1;
    var stage = document.getElementById("stage");
    var word = n === 1 ? "gift sub" : (n >= 2 && n <= 4 ? "gift suby" : "gift subů");
    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<span class="corner tl"></span><span class="corner tr"></span>'
      + '<span class="corner bl"></span><span class="corner br"></span>'
      + '<span class="pp-tick"><span></span><span></span></span>'
      + '<span class="shock"></span><div id="confetti"></div>'
      + '<div class="banner">GIFT SUB</div>'
      + '<div class="gift">🎁</div>'
      + avHTML(g)
      + '<div class="nm">' + esc(g.username || "Anonym") + '</div>'
      + '<div class="msg">daroval <b>' + n + '</b> ' + word + '!</div>'
      + '<div class="sub">🌾 díky za podporu farmy · zurys.live</div>';
    stage.appendChild(card);
    confetti(card.querySelector("#confetti"), Math.min(80, 28 + n * 4));
    // restart animací
    void card.offsetWidth;
    card.classList.add("show");
    chime();
    setTimeout(function () {
      card.classList.remove("show"); card.classList.add("out");
      setTimeout(function () { card.remove(); playing = false; playNext(); }, 480);
    }, HOLD_MS);
  }
  function playNext() {
    if (playing || !queue.length) return;
    playing = true; showAlert(queue.shift());
  }
  function enqueue(g) { queue.push(g); playNext(); }

  function poll() {
    var url = lastId == null ? "/api/recent-gifts" : "/api/recent-gifts?since=" + lastId;
    fetch(url, { cache: "no-store" }).then(function (r) { return r.json(); }).then(function (d) {
      if (lastId == null) { lastId = d.latest_id; return; }   // baseline – staré gifty nehlásit
      (d.gifts || []).forEach(enqueue);
      lastId = d.latest_id;
    }).catch(function () {});
  }

  if (new URLSearchParams(location.search).has("demo")) {
    var samples = [
      { username: "Martech1", subs: 10 },
      { username: "Numero_21", subs: 1 },
      { username: "Kapepepe", subs: 3 },
      { username: "skytlix", subs: 25 }
    ], di = 0;
    function demoLoop() { enqueue(samples[di % samples.length]); di++; setTimeout(demoLoop, HOLD_MS + 1400); }
    demoLoop();
  } else {
    poll();
    setInterval(poll, POLL_MS);
  }
</script>
</body>
</html>
