<svg width="300" height="410" viewBox="0 0 300 410" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="150" y1="0" x2="150" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071208" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#080906" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="grain" x1="69" y1="151" x2="214" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE27A"/>
      <stop offset="0.45" stop-color="#FFD25A"/>
      <stop offset="1" stop-color="#D99025"/>
    </linearGradient>
    <linearGradient id="shine" x1="80" y1="78" x2="214" y2="285" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.35"/>
      <stop offset="0.38" stop-color="white" stop-opacity="0.09"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="panelGlow" x="-35" y="-35" width="370" height="480" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="17"/>
      <feOffset/>
      <feComposite in2="SourceAlpha" operator="out"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.553 0 0 0 0 0.949 0 0 0 0 0.290 0 0 0 0.26 0"/>
      <feBlend mode="normal" in2="BackgroundImageFix" result="effect1_dropShadow"/>
      <feBlend mode="normal" in="SourceGraphic" in2="effect1_dropShadow" result="shape"/>
    </filter>
    <filter id="grainGlow" x="37" y="114" width="226" height="204" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

